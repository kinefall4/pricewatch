version: 0.2

env:
  variables:
    HUGO_VERSION: "0.156.0"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install pandas numpy scikit-learn openpyxl
      - curl -L -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
      - tar -xzf hugo.tar.gz
      - mv hugo /usr/local/bin/hugo
      - hugo version

  build:
    commands:
      - python src/validate_data.py data/prices_demo.csv
      - python src/generate_site_data.py data/prices_demo.csv
      - cd site
      - hugo --minify
      - cd ..

  post_build:
    commands:
      - aws s3 sync site/public s3://$S3_BUCKET --delete